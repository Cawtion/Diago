name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ───────────────────────────────────────────────────────────
  # Build Tauri Desktop Apps
  # ───────────────────────────────────────────────────────────
  build-tauri:
    name: Build Desktop (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libportaudio2

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: "Diago ${{ github.ref_name }}"
          releaseBody: "See the assets for downloadable installers."
          releaseDraft: true
          prerelease: false

  # ───────────────────────────────────────────────────────────
  # Deploy Cloud API
  # ───────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy Cloud API
    runs-on: ubuntu-latest
    needs: [build-tauri]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway/Fly.io
        run: |
          echo "API deployment step placeholder"
          echo "Configure your preferred hosting provider:"
          echo "  - Railway: railway up"
          echo "  - Fly.io: flyctl deploy"
          echo "  - Render: auto-deploy from git"
